<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="Cache-Control" content="no-store, no-cache, private, max-age=0">
        <meta http-equiv="Pragma" content="no-cache">
        <meta http-equiv="Expires" content="-1">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Support Center for EaglercraftX" />
        <title>Support Center</title>
        <style>
            :root {
                --bg: #ffffff;
                --text: #1a1a1a;
                --secondary: #666666;
                --accent: #2563eb;
                --success: #10b981;
                --error: #ef4444;
                --border: #eeeeee;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #111111;
                    --text: #eeeeee;
                    --secondary: #999999;
                    --accent: #3b82f6;
                    --border: #222222;
                }
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background-color: var(--bg);
                color: var(--text);
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                margin: 0;
                line-height: 1.5;
            }

            .container {
                width: 100%;
                max-width: 450px;
                padding: 24px;
            }

            h1 {
                font-size: 1.5rem;
                font-weight: 700;
                margin: 0 0 16px 0;
                text-align: center;
            }

            .info-card {
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 16px;
                margin-bottom: 24px;
                font-size: 0.9rem;
                text-align: center;
            }

            .status-text {
                color: var(--secondary);
                text-align: left;
                margin-bottom: 8px;
                font-size: 0.85rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .support-list {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .support-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 16px;
                border: 1px solid var(--border);
                border-radius: 10px;
                text-decoration: none;
                transition: background 0.2s, border-color 0.2s;
            }

            .support-row:hover {
                background: var(--border);
                border-color: var(--secondary);
            }

            .support-info {
                display: flex;
                flex-direction: column;
            }

            .support-title {
                font-weight: 500;
                font-size: 0.95rem;
                color: var(--text);
            }

            .support-category {
                font-size: 0.8rem;
                color: var(--secondary);
            }

            .arrow {
                color: var(--accent);
                font-weight: bold;
            }

            footer {
                margin-top: 32px;
                text-align: center;
            }

            .back-link {
                color: var(--secondary);
                text-decoration: none;
                font-size: 0.85rem;
            }

            .back-link:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Support Center</h1>

            <div class="info-card">
                Welcome to the help desk. Select a topic below to get assistance with common issues.
            </div>

            <div class="status-text">Available Articles</div>

            <div class="support-list">
                <a href="./cannot_connect_to_shared_world.html" class="support-row">
                    <div class="support-info">
                        <span class="support-title">Cannot connect to shared world</span>
                        <span class="support-category">Multiplayer Issues</span>
                    </div>
                    <span class="arrow">→</span>
                </a>
            </div>

            <footer>
                <a href="././" class="back-link">← Back to Main Page</a>
            </footer>
        </div>
    </body>
</html>
